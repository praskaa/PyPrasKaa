# pyRevit Bundle Configuration - Views Pulldown

title:
  en_us: Views

tooltip:
  en_us: |
    View Management Tools - Configuration & Visualization

    Advanced tools for managing Revit views, crop boxes, and view ranges.
    Control view properties and visualize view depths for better
    documentation control.

    FEATURES:
    • Set Crop View Standard - Crop box line weight management
    • View Range - 3D visualization of view depths
    • Create Filter by Subcategory - Advanced filtering tools
    • Set View Title on Sheet - Copy view name to title parameter
    • Multi-view Operations - Batch view modifications

    WORKFLOW SUPPORT:
    • View property standardization
    • Visual range analysis
    • Filter-based view control
    • Documentation consistency

    Version: 2.0 | Author: PrasKaa Team

author: PrasKaa Team
help_url: https://github.com/praskaa/pyrevit-tools/wiki/View-Tools

# Pulldown Layout Configuration
layout:
  - OverrideCropSectionView
  - ViewRange
  - CreateFilterSectionBySubcategory
  - SetViewTitleOnSheet
  - -----
  - VisibilityLinkRevit

# Engine Configuration
engine:
  clean: true
  full_frame: false
  persistent: false

# Context and Version Requirements
context: ["Project"]
min_revit_ver: 2018
max_revit_ver: 2026