# pyRevit Bundle Configuration - Sheets Pulldown

title:
  en_us: Sheets

tooltip:
  en_us: |
    Sheet Management Tools - Organization & Numbering

    Comprehensive tools for managing Revit sheets and viewports.
    Automated numbering, alignment, and organization for professional
    documentation sets.

    FEATURES:
    • Add Running Number - Automated sheet numbering
    • Align Viewports - Precise viewport alignment
    • Set Sheet Number from Print Order - Assign sequential numbers based on print order
    • Shift Selected Sheet Numbers - Custom sheet number shifting
    • Multi-sheet Operations - Batch sheet processing

    WORKFLOW SUPPORT:
    • Sequential numbering systems
    • Viewport positioning control
    • Sheet organization automation
    • Documentation set management

    Version: 2.0 | Author: PrasKaa Team

author: PrasKaa Team
help_url: https://github.com/praskaa/pyrevit-tools/wiki/Sheet-Tools

# Pulldown Layout Configuration
layout:
  - AddRunningNumberToSheetList
  - AlignViewports
  - SetSheetNumberFromPrintOrder
  - ShiftSelectedSheetNumbers
  - -----
  - CsvTemplate
  - SheetsCsv

# Engine Configuration
engine:
  clean: true
  full_frame: false
  persistent: false

# Context and Version Requirements
context: doc-project
min_revit_ver: 2018
max_revit_ver: 2026