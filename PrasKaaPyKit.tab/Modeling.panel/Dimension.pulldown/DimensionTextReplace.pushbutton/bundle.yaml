title: Find and Replace Dimension Text
tooltip: Find and replace text in dimension text overrides
tooltip_ext: |
  Find and replace text patterns in dimension text overrides.
  
  Searches in:
  - ValueOverride (complete text replacement)
  - Prefix (text before value)
  - Suffix (text after value)
  - Above (text above dimension)
  - Below (text below dimension)

