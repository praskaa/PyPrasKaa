title: Copy Detail Elements
tooltip: Copy detail elements from source view to target view in different document
tooltip_ext: |
  Copies detail elements from a source view to a matching view in another document.
  
  Workflow:
  1. Select source and target documents
  2. Select source view (auto-match in target)
  3. Auto-select all detail elements
  4. Set target view to wireframe (commit)
  5. Paste elements (commit)
  6. Finalize and restore view (commit)

author: PrasKaa
