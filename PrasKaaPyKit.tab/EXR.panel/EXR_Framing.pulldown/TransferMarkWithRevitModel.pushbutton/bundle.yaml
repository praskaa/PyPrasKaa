bundle:
  name: TransferMark with Revit Model
  tooltip: Copy Mark parameter from linked Revit model to host model using geometric intersection
  description: |
    Transfers Mark parameter values from Structural Framing elements in a linked Revit model
    to corresponding elements in the host model based on geometric intersection matching.
    
    Features:
    - Uses largest intersection volume to find matching beams
    - Directly copies Mark parameter (no Type Name parsing)
    - Works with selection or all Structural Framing elements
    - Simple and fast workflow

  author: Prasetyo
  help_url: https://github.com/praska/PrasKaaPyKit/wiki/TransferMarkWithRevitModel

  keywords:
    - mark
    - transfer
    - linked model
    - structural framing
    - beams
    - geometry matching

  context:
    extension: true
    toolbar: QualityControl
    panel: EXR_Framing
    pulldown: TransferMark

  visibility:
    revit:
      - 2021
      - 2022
      - 2023
      - 2024
      - 2025

  requirements:
    categories:
      - OST_StructuralFraming

  execution:
    transaction_mode: manual
